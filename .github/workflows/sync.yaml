name: CloudFormation deploy

on:
  pull_request:
    types: [closed]
    branches:
      - develop
      - qa
      - prod

jobs:
  prepare:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.base_ref }}
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    outputs:
      timestamp: ${{ steps.set-timestamp.outputs.timestamp }}
      tags: ${{ steps.set-env.outputs.tags }}
      common_params: ${{ steps.set-env.outputs.common_params }}
      region: ${{ steps.set-env.outputs.region }}
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v2

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Set environment and parameters
        run: |
          ENVIRONMENT=${{ github.base_ref == 'develop' && 'dev' || github.base_ref }}
          echo "ENVIRONMENT=$ENVIRONMENT" >> $GITHUB_ENV
          echo "REGION=us-east-1" >> $GITHUB_ENV
          echo "PARAMETERS_FILE=./parameters-$ENVIRONMENT.json" >> $GITHUB_ENV
          echo "PARAMETERS_TAG=./tags-$ENVIRONMENT.json" >> $GITHUB_ENV
          echo "PARAMETERS_TAG=./tags-$ENVIRONMENT.json" >> $GITHUB_ENV

      - name: Check JSON file integrity
        run: |
          echo "Verificando archivo de parĂˇmetros: $PARAMETERS_FILE"
          # Validar explĂ­citamente el JSON y mostrar errores si existen
          if ! jq . "$PARAMETERS_FILE" > /dev/null 2>&1; then
            echo "Error en el formato JSON. Intentando reparar..."
            # Crear una versiĂłn simplificada del JSON para diagnĂłstico
            cp "$PARAMETERS_FILE" "${PARAMETERS_FILE}.bak"
            # Eliminar posibles caracteres invisibles
            tr -cd '\11\12\15\40-\176' < "${PARAMETERS_FILE}.bak" > "$PARAMETERS_FILE"
            # Verificar de nuevo
            if ! jq . "$PARAMETERS_FILE" > /dev/null 2>&1; then
              echo "No se pudo reparar el archivo JSON."
              exit 1
            else
              echo "Archivo JSON reparado exitosamente."
            fi
          else
            echo "Archivo JSON vĂˇlido."
          fi

      - name: Load JSON into Environment Variables
        run: |
          # Leer el archivo completo en una variable para evitar problemas de procesamiento
          JSON_CONTENT=$(cat "$PARAMETERS_FILE")

          # Procesar objetos simples
          for key in $(echo "$JSON_CONTENT" | jq -r '.[] | select(has("TEAM") or has("ENVIRONMENT") or has("BRANCH_NAME") or has("REPOSITORY_NAME") or has("ARTIFACTORY_BUCKET") or has("ANALYTICS_BUCKET") or has("AWS_ACCOUNT_ID") or has("AWS_ACCOUNT_ID_OPT") or has("DB_STAGE") or has("DB_ANALYTICS") or has("AWS_ACCOUNT") or has("AWS_RUTADIGITAL_ID") or has("DEVELOPER")) or has("AWS_DATALAKE_ID")) | keys[0]'); do
            value=$(echo "$JSON_CONTENT" | jq -r ".[] | select(has(\"$key\")) | .\"$key\"")
            echo "${key}=${value}" >> $GITHUB_ENV
            echo "Cargado: ${key}=${value}"
          done

          # Procesar ETA_CONFIG separadamente
          echo "$JSON_CONTENT" | jq -c '.[] | select(has("ETA_CONFIG"))' > /tmp/eta_config.json
          if [ -s /tmp/eta_config.json ]; then
            for key in $(cat /tmp/eta_config.json | jq -r '.ETA_CONFIG | keys[]'); do
              value=$(cat /tmp/eta_config.json | jq -r ".ETA_CONFIG.\"$key\"")
              echo "ETA_CONFIG_${key}=${value}" >> $GITHUB_ENV
              echo "Cargado: ETA_CONFIG_${key}=${value}"
            done
          fi
          
          # Procesar ETA_TOKENS separadamente
          echo "$JSON_CONTENT" | jq -c '.[] | select(has("ETA_TOKENS"))' > /tmp/eta_tokens.json
          if [ -s /tmp/eta_tokens.json ]; then
            for key in $(cat /tmp/eta_tokens.json | jq -r '.ETA_TOKENS | keys[]'); do
              value=$(cat /tmp/eta_tokens.json | jq -r ".ETA_TOKENS.\"$key\"")
              echo "ETA_TOKENS_${key}=${value}" >> $GITHUB_ENV
              echo "Cargado: ETA_TOKENS_${key}=${value}"
            done
          fi

          echo "Loaded variables from $PARAMETERS_FILE."

      - name: Set timestamp
        id: set-timestamp
        run: echo "timestamp=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

      - name: Set ENV
        id: set-env
        run: |
          TAGS=$(jq -r 'map("\(.Key)=\(.Value|gsub(" "; "_")|gsub("&"; "and"))") | join(" ")' $PARAMETERS_TAG)
          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          COMMON_PARAMS="pTeamName=$TEAM Stage=$ENVIRONMENT pBranchName=$BRANCH_NAME pdbAnalyticsName=$DB_ANALYTICS pArtifactsBucket=$ARTIFACTORY_BUCKET pAWSRegion=us-east-1 pAWSAccountId=$AWS_ACCOUNT_ID pAWSAccountOpt=$AWS_ACCOUNT_ID_OPT pdbStageName=$DB_STAGE pAccountName=$AWS_ACCOUNT pbucketAnalytics=$ANALYTICS_BUCKET pdeploymentDate=${{ steps.set-timestamp.outputs.timestamp }} pRDAWSAccountId=$AWS_RUTADIGITAL_ID"
          echo "common_params=$COMMON_PARAMS" >> $GITHUB_OUTPUT
          echo "region=us-east-1" >> $GITHUB_OUTPUT
          echo "AWS_IAM_ROLE= ${{ secrets.AWS_IAM_ROLE }}" >> $GITHUB_OUTPUT

      - name: Determine matrix for deploy-projects
        id: set-matrix
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          MATRIX='{"include":['

          if [[ "$TITLE" == *"koa-da-ecodistribucion-eta"* || "$TITLE" == *"-all"* ]]; then
            MATRIX+='{"stack":"koa-da-ecodistribucion-eta"},'
          fi
          if [[ "$TITLE" == *"koa-da-ecodistribucion-misupply"* || "$TITLE" == *"-all"* ]]; then
            MATRIX+='{"stack":"koa-da-ecodistribucion-misupply"},'
          fi
          if [[ "$TITLE" == *"koa-da-ecodistribucion-nps-feedback"* || "$TITLE" == *"-all"* ]]; then
            MATRIX+='{"stack":"koa-da-ecodistribucion-nps-feedback"},'
          fi
          if [[ "$TITLE" == *"koa-da-ecodistribucion-optimizador"* || "$TITLE" == *"-all"* ]]; then
            MATRIX+='{"stack":"koa-da-ecodistribucion-optimizador"},'
          fi

          MATRIX="${MATRIX%,}]}"  # elimina coma final
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  deploy-resources-cross:
    needs: [prepare]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    outputs:
      tags: ${{ steps.export-env.outputs.tags }}
      common_params: ${{ steps.export-env.outputs.common_params }}
      region: ${{ steps.export-env.outputs.region }}
      matrix: ${{ needs.prepare.outputs.matrix }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v2
      

      - name: Export ENV variables
        id: export-env
        run: |
          echo "TAGS=${{ needs.prepare.outputs.tags }}" >> $GITHUB_ENV
          echo "COMMON_PARAMS=${{ needs.prepare.outputs.common_params }}" >> $GITHUB_ENV
          echo "REGION=${{ needs.prepare.outputs.region }}" >> $GITHUB_ENV
          echo "AWS_IAM_ROLE=${{ needs.prepare.outputs.aws_iam_role }}" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          role-session-name: awssyncsession
          role-to-assume: $AWS_IAM_ROLE
          aws-region: $REGION

      - name: Load Deployment Script
        run: |
          cat << 'EOF' > deploy_stack.sh
          #!/bin/bash
          set -euxo pipefail
          REGION=${REGION:-us-east-1}
          function deploy_stack() {
            local template=$1
            local stack_name=$2
            local extra_params="${3:-}"
            echo "Deploying $stack_name using template: templates/$template"
            echo "With extra params: $extra_params"
            if [ -z "$template" ] || [ -z "$stack_name" ]; then
              echo "ERROR: template and stack_name are required"
              exit 1
            fi
            TAGS_PARAM="${TAGS:+--tags $TAGS}"
            PARAMS="${COMMON_PARAMS:+--parameter-overrides $COMMON_PARAMS $extra_params}"
            aws cloudformation deploy \
              --template-file templates/$template \
              --region "$REGION" \
              --stack-name "$stack_name" \
              --capabilities CAPABILITY_NAMED_IAM \
              --no-fail-on-empty-changeset \
              $TAGS_PARAM \
              $PARAMS
            aws cloudformation describe-stack-events \
              --region "$REGION" \
              --stack-name "$stack_name" \
              --max-items 5 \
              --output table
          }
          EOF
          chmod +x deploy_stack.sh

      - name: Deploy IAM Stack
        if: contains(github.event.pull_request.title, '-iam') || contains(github.event.pull_request.title, '-all')
        run: |
          source ./deploy_stack.sh
          deploy_stack "iam.yml" "da-josemaria-iam"

      - name: Deploy S3 Stack
        if: contains(github.event.pull_request.title, '-s3') || contains(github.event.pull_request.title, '-all')
        run: |
          source ./deploy_stack.sh
          deploy_stack "s3.yml" "da-josemaria-s3"

      - name: Deploy Athena Stack
        if: contains(github.event.pull_request.title, '-athenacatalogo') || contains(github.event.pull_request.title, '-all')
        run: |
          source ./deploy_stack.sh
          deploy_stack "athenacatalogo.yml" "da-josemaria-athenacatalogo" "pdbAnalyticsName=$DB_ANALYTICS"


  deploy-projects-ecodistribucion:
    if: ${{ needs.deploy-core.outputs.matrix != '{}' }}
    needs: deploy-resources-cross
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix: ${{ fromJson(needs.deploy-core.outputs.matrix) }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v2

      - name: Export ENV variables
        id: export-env
        run: |
          echo "TAGS=${{ needs.prepare.outputs.tags }}" >> $GITHUB_ENV
          echo "COMMON_PARAMS=${{ needs.prepare.outputs.common_params }}" >> $GITHUB_ENV
          echo "REGION=${{ needs.prepare.outputs.region }}" >> $GITHUB_ENV
          echo "AWS_IAM_ROLE=${{ needs.prepare.outputs.aws_iam_role }}" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          role-session-name: awssyncsession
          role-to-assume: $AWS_IAM_ROLE
          aws-region: $REGION

      - name: Load Deployment Script
        run: |
          cat << 'EOF' > deploy_stack.sh
          #!/bin/bash
          set -euxo pipefail
          REGION=${REGION:-us-east-1}
          function deploy_stack() {
            local template=$1
            local stack_name=$2
            local extra_params="${3:-}"
            TAGS_PARAM="${TAGS:+--tags $TAGS}"
            PARAMS="${COMMON_PARAMS:+--parameter-overrides $COMMON_PARAMS $extra_params}"
            aws cloudformation deploy \
              --template-file templates/$template \
              --region "$REGION" \
              --stack-name "$stack_name" \
              --capabilities CAPABILITY_NAMED_IAM \
              --no-fail-on-empty-changeset \
              $TAGS_PARAM \
              $PARAMS
          }
          EOF
          chmod +x deploy_stack.sh

      - name: Deploy Stack ${{ matrix.stack }}
        run: |
          source ./deploy_stack.sh
          case "${{ matrix.stack }}" in
            koa-da-ecodistribucion-eta)
              deploy_stack koa-da-ecodistribucion-eta.yml koa-da-ecodistribucion-eta "pEtaheremapskey=HOLA_1 pEtaCarlosValdovinosSr=HOLA_2 pPuenteAltoSr=HOLA_1"
              ;;
            koa-da-ecodistribucion-misupply)
              deploy_stack koa-da-ecodistribucion-misupply.yml koa-da-ecodistribucion-misupply
              ;;
            koa-da-ecodistribucion-nps-feedback)
              deploy_stack koa-da-ecodistribucion-nps-feedback.yml koa-da-ecodistribucion-nps-feedback
              ;;
            koa-da-ecodistribucion-optimizador)
              deploy_stack koa-da-ecodistribucion-optimizador.yml koa-da-ecodistribucion-optimizador
              ;;
          esac

