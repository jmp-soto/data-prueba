name: CloudFormation deploy

on:
  pull_request:
    types: [closed]
    branches: [develop, qa, prod]

jobs:
  build:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.base_ref }}

    permissions:
      id-token: write
      contents: read
      pull-requests: write

    env:
      REGION: "us-east-1"

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v2

      - name: Install dependencies
        run: |
          if ! command -v jq &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y jq
          fi

      - name: Set environment variables
        run: |
          ENVIRONMENT=${{ github.base_ref == 'develop' && 'dev' || github.base_ref }}
          echo "ENVIRONMENT=$ENVIRONMENT" >> $GITHUB_ENV
          echo "PARAMETERS_FILE=./parameters-$ENVIRONMENT.json" >> $GITHUB_ENV
          echo "PARAMETERS_TAG=./tags-$ENVIRONMENT.json" >> $GITHUB_ENV

      - name: Set timestamp
        run: echo "TIMESTAMP=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_ENV

      - name: Load JSON into Environment Variables
        run: |
          for row in $(jq -c '.[]' $PARAMETERS_FILE); do
            key=$(echo $row | jq -r 'keys[0]')
            value=$(echo $row | jq -r '.[]')
            echo "${key}=${value}" >> $GITHUB_ENV
          done

      - name: Process Tags
        run: |
          TAGS=$(jq -r 'map("\(.Key)=\(.Value|gsub(\" \", \"_\")|gsub(\"&\", \"and\"))") | join(" ")' $PARAMETERS_TAG)
          echo "TAGS=${TAGS}" >> $GITHUB_ENV

      - name: Set common parameters
        run: |
          echo "COMMON_PARAMS=pTeamName=$TEAM Stage=$ENVIRONMENT pBranchName=$BRANCH_NAME pdbAnalyticsName=$DB_ANALYTICS pArtifactsBucket=$ARTIFACTORY_BUCKET pAWSRegion=$REGION pAWSAccountId=$AWS_ACCOUNT_ID pAWSAccountOpt=$AWS_ACCOUNT_ID_OPT pdbStageName=$DB_STAGE pAccountName=$AWS_ACCOUNT pbucketAnalytics=$ANALYTICS_BUCKET pdeploymentDate=$TIMESTAMP pRDAWSAccountId=$AWS_RUTADIGITAL_ID" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-session-name: awssyncsession
          role-to-assume: ${{ secrets.AWS_IAM_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Define deployment function
        run: |
          cat << 'EOF' > deploy_stack.sh
          #!/bin/bash
          set -e
          set -x

          function deploy_stack() {
            local template=$1
            local stack_name=$2
            local extra_params="${3:-}"

            if [ -z "$template" ] || [ -z "$stack_name" ]; then
              echo "ERROR: template and stack_name are required"
              exit 1
            fi

            aws cloudformation deploy \
              --template-file templates/$template \
              --region $REGION \
              --stack-name $stack_name \
              --capabilities CAPABILITY_NAMED_IAM \
              --no-fail-on-empty-changeset \
              --tags $TAGS \
              --parameter-overrides \
                $COMMON_PARAMS \
                $extra_params

            aws cloudformation describe-stack-events \
              --stack-name $stack_name \
              --max-items 5 \
              --output table
          }
          EOF
          chmod +x deploy_stack.sh

      - name: Upload layers to S3
        if: contains(github.event.pull_request.title, '-layer')
        run: |
          for file in ./layers/*.zip; do
            aws s3 cp "$file" "s3://$ARTIFACTORY_BUCKET/layers/"
          done

  deploy-core-stacks:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    strategy:
      matrix:
        stack: [iam, s3, athenacatalogo]
    needs: build
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v2

      - name: Load Deployment Script
        run: |
          cat << 'EOF' > deploy_stack.sh
          #!/bin/bash
          set -e
          set -x

          function deploy_stack() {
            local template=$1
            local stack_name=$2
            local extra_params="${3:-}"

            aws cloudformation deploy \
              --template-file templates/$template \
              --region $REGION \
              --stack-name $stack_name \
              --capabilities CAPABILITY_NAMED_IAM \
              --no-fail-on-empty-changeset \
              --tags $TAGS \
              --parameter-overrides $COMMON_PARAMS $extra_params
          }
          EOF
          chmod +x deploy_stack.sh

      - name: Deploy Core Stack
        run: |
          source ./deploy_stack.sh
          case "${{ matrix.stack }}" in
            iam)
              deploy_stack "iam.yml" "da-josemaria-iam"
              ;;
            s3)
              deploy_stack "s3.yml" "da-josemaria-s3"
              ;;
            athenacatalogo)
              deploy_stack "athenacatalogo.yml" "da-josemaria-athenacatalogo" "pdbAnalyticsName=$DB_ANALYTICS"
              ;;
          esac

  deploy-remaining-stacks:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    strategy:
      matrix:
        stack:
          - koa-da-ecodistribucion-eta
          - koa-da-ecodistribucion-misupply
          - koa-da-ecodistribucion-nps-feedback
          - koa-da-ecodistribucion-optimizador
    needs: deploy-core-stacks
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v2

      - name: Load Deployment Script
        run: |
          cat << 'EOF' > deploy_stack.sh
          #!/bin/bash
          set -e
          set -x

          function deploy_stack() {
            local template=$1
            local stack_name=$2
            local extra_params="${3:-}"

            aws cloudformation deploy \
              --template-file templates/$template \
              --region $REGION \
              --stack-name $stack_name \
              --capabilities CAPABILITY_NAMED_IAM \
              --no-fail-on-empty-changeset \
              --tags $TAGS \
              --parameter-overrides $COMMON_PARAMS $extra_params
          }
          EOF
          chmod +x deploy_stack.sh

      - name: Deploy Remaining Stack
        run: |
          source ./deploy_stack.sh
          case "${{ matrix.stack }}" in
            koa-da-ecodistribucion-eta)
              deploy_stack "koa-da-ecodistribucion-eta.yml" "koa-da-ecodistribucion-eta" "pEtaheremapskey=$HOLA_1 pEtaCarlosValdovinosSr=$HOLA_2 pPuenteAltoSr=$HOLA_1"
              ;;
            koa-da-ecodistribucion-misupply)
              deploy_stack "koa-da-ecodistribucion-misupply.yml" "koa-da-ecodistribucion-misupply"
              ;;
            koa-da-ecodistribucion-nps-feedback)
              deploy_stack "koa-da-ecodistribucion-nps-feedback.yml" "koa-da-ecodistribucion-nps-feedback"
              ;;
            koa-da-ecodistribucion-optimizador)
              deploy_stack "koa-da-ecodistribucion-optimizador.yml" "koa-da-ecodistribucion-optimizador"
              ;;
          esac
