name: CloudFormation deploy

on:
  pull_request:
    types: [closed]
    branches: [develop, qa, prod]

jobs:
  prepare-stacks:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.base_ref }}
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      timestamp: ${{ steps.set-timestamp.outputs.timestamp }}
      stacks-to-deploy: ${{ steps.determine-stacks.outputs.stacks }}
      deploy-layers: ${{ steps.determine-stacks.outputs.deploy-layers }}

    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set environment variables
        id: set-env
        run: |
          ENVIRONMENT=${{ github.base_ref == 'develop' && 'dev' || github.base_ref }}
          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT

      - name: Set timestamp
        id: set-timestamp
        run: |
          TIMESTAMP=$(date +'%Y%m%d%H%M%S')
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

      - name: Determine stacks to deploy
        id: determine-stacks
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          echo "Título del PR: '$PR_TITLE'"
          
          # Convertir a minúsculas para hacer la comparación insensible a mayúsculas/minúsculas
          PR_TITLE_LOWER=$(echo "$PR_TITLE" | tr '[:upper:]' '[:lower:]')
          echo "Título en minúsculas: '$PR_TITLE_LOWER'"

          # Array para almacenar los stacks a desplegar
          declare -a STACKS_ARRAY

          # Flag para capas
          DEPLOY_LAYERS="false"

          # Verificar si se desea desplegar todo
          if [[ "$PR_TITLE_LOWER" == *"-all"* ]]; then
            echo "Detectado patrón '-all', desplegando todos los stacks"
            STACKS_ARRAY=("koa-da-ecodistribucion-eta" "koa-da-ecodistribucion-misupply" "koa-da-ecodistribucion-nps-feedback" "koa-da-ecodistribucion-optimizador")
          else
            # Verificar cada stack individual
            
            # ETA stack - múltiples patrones
            if [[ "$PR_TITLE_LOWER" == *"deploy-koa-da-ecodistribucion-eta"* || 
                  "$PR_TITLE_LOWER" == *"deploy koa-da-ecodistribucion-eta"* || 
                  "$PR_TITLE_LOWER" == *"deploy-eta"* || 
                  "$PR_TITLE_LOWER" == *"deploy eta"* ||
                  "$PR_TITLE_LOWER" == *"-koa-da-ecodistribucion-eta"* || 
                  "$PR_TITLE_LOWER" == *"- koa-da-ecodistribucion-eta"* ]]; then
              STACKS_ARRAY+=("koa-da-ecodistribucion-eta")
              echo "Detectado patrón para ETA, añadiendo 'koa-da-ecodistribucion-eta'"
            fi
            
            
            # Misupply
            if [[ "$PR_TITLE_LOWER" == *"-koa-da-ecodistribucion-misupply"* || "$PR_TITLE_LOWER" == *"- koa-da-ecodistribucion-misupply"* ]]; then 
              STACKS_ARRAY+=("koa-da-ecodistribucion-misupply")
              echo "Detectado patrón para Misupply, añadiendo 'koa-da-ecodistribucion-misupply'" 
            fi
            
            # NPS Feedback
            if [[ "$PR_TITLE_LOWER" == *"-koa-da-ecodistribucion-nps-feedback"* || "$PR_TITLE_LOWER" == *"- koa-da-ecodistribucion-nps-feedback"* ]]; then 
              STACKS_ARRAY+=("koa-da-ecodistribucion-nps-feedback")
              echo "Detectado patrón para NPS Feedback, añadiendo 'koa-da-ecodistribucion-nps-feedback'" 
            fi
            
            # Optimizador
            if [[ "$PR_TITLE_LOWER" == *"-koa-da-ecodistribucion-optimizador"* || "$PR_TITLE_LOWER" == *"- koa-da-ecodistribucion-optimizador"* ]]; then 
              STACKS_ARRAY+=("koa-da-ecodistribucion-optimizador")
              echo "Detectado patrón para Optimizador, añadiendo 'koa-da-ecodistribucion-optimizador'" 
            fi
          fi
          
          # Verificar si se desea desplegar capas (layers)
          if [[ "$PR_TITLE_LOWER" == *"-layer"* || "$PR_TITLE_LOWER" == *"- layer"* ]]; then
            DEPLOY_LAYERS="true"
            echo "Se detectó patrón para desplegar capas (layers)"
          fi
          
          # Crear un JSON adecuado para la matriz - CORREGIDO PARA ELIMINAR Caracteres de nueva línea
          # y espacios en blanco
          if [ ${#STACKS_ARRAY[@]} -eq 0 ]; then
            STACKS_JSON="[]"
          else
            # Método 1: Crear JSON directamente sin usar printf/echo que añada nuevas líneas
            STACKS_JSON="["
            for ((i=0; i<${#STACKS_ARRAY[@]}; i++)); do
              STACKS_JSON+="\"${STACKS_ARRAY[$i]}\""
              if [ $i -lt $((${#STACKS_ARRAY[@]}-1)) ]; then
                STACKS_JSON+=","
              fi
            done
            STACKS_JSON+="]"
          fi

          echo "stacks=$STACKS_JSON" >> $GITHUB_OUTPUT
          echo "deploy-layers=$DEPLOY_LAYERS" >> $GITHUB_OUTPUT

          # Imprimir un resumen final para diagnóstico
          echo "-------- RESUMEN DE DESPLIEGUE --------"
          echo "Stacks a desplegar: ${STACKS_JSON}"
          echo "Desplegar Layers: ${DEPLOY_LAYERS}"
          echo "--------------------------------------"

  upload-layers:
    needs: prepare-stacks
    if: needs.prepare-stacks.outputs.deploy-layers == 'true'
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.base_ref }}

    permissions:
      id-token: write
      contents: read

    env:
      ENVIRONMENT: ${{ needs.prepare-stacks.outputs.environment }}
      REGION: "us-east-1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE }}
          role-session-name: awssyncsession
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set parameters file
        run: |
          echo "PARAMETERS_FILE=./parameters-$ENVIRONMENT.json" >> $GITHUB_ENV

      - name: Load JSON into Environment Variables
        run: |
          # Validar que el archivo JSON sea válido
          jq . "$PARAMETERS_FILE" > /dev/null

          # Extraer valores simples y objetos anidados por separado
          JSON_CONTENT=$(cat "$PARAMETERS_FILE")
          ARTIFACTORY_BUCKET=$(echo "$JSON_CONTENT" | jq -r '.[] | select(has("ARTIFACTORY_BUCKET")) | .ARTIFACTORY_BUCKET')
          echo "ARTIFACTORY_BUCKET=${ARTIFACTORY_BUCKET}" >> $GITHUB_ENV

      - name: Upload layers to S3
        run: |
          aws s3 cp ./layers/awswrangler-layer-py3-9.zip s3://$ARTIFACTORY_BUCKET/layers/
          aws s3 cp ./layers/request-layer-py3-12.zip s3://$ARTIFACTORY_BUCKET/layers/
          echo "Layers uploaded successfully"

  deploy-stacks:
    needs: [prepare-stacks]
    if: needs.prepare-stacks.outputs.stacks-to-deploy != '[]'
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.base_ref }}

    strategy:
      matrix:
        stack: ${{ fromJson(needs.prepare-stacks.outputs.stacks-to-deploy) }}
      # Para esperar a que todos los trabajos terminen antes de continuar, incluso si alguno falla
      fail-fast: false

    permissions:
      id-token: write
      contents: read

    env:
      ENVIRONMENT: ${{ needs.prepare-stacks.outputs.environment }}
      REGION: "us-east-1"
      TIMESTAMP: ${{ needs.prepare-stacks.outputs.timestamp }}
      STACK_NAME: ${{ matrix.stack }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE }}
          role-session-name: awssyncsession
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set parameters and tags files
        run: |
          echo "PARAMETERS_FILE=./parameters-$ENVIRONMENT.json" >> $GITHUB_ENV
          echo "PARAMETERS_TAG=./tags-$ENVIRONMENT.json" >> $GITHUB_ENV

      - name: Check JSON file integrity
        run: |
          echo "Verificando archivo de parámetros: $PARAMETERS_FILE"
          # Validar explícitamente el JSON y mostrar errores si existen
          if ! jq . "$PARAMETERS_FILE" > /dev/null 2>&1; then
            echo "Error en el formato JSON. Intentando reparar..."
            # Crear una versión simplificada del JSON para diagnóstico
            cp "$PARAMETERS_FILE" "${PARAMETERS_FILE}.bak"
            # Eliminar posibles caracteres invisibles
            tr -cd '\11\12\15\40-\176' < "${PARAMETERS_FILE}.bak" > "$PARAMETERS_FILE"
            # Verificar de nuevo
            if ! jq . "$PARAMETERS_FILE" > /dev/null 2>&1; then
              echo "No se pudo reparar el archivo JSON."
              exit 1
            else
              echo "Archivo JSON reparado exitosamente."
            fi
          else
            echo "Archivo JSON válido."
          fi

      - name: Load JSON into Environment Variables
        run: |
          # Leer el archivo completo en una variable para evitar problemas de procesamiento
          JSON_CONTENT=$(cat "$PARAMETERS_FILE")

          # Procesar objetos simples
          for key in $(echo "$JSON_CONTENT" | jq -r '.[] | select(has("TEAM") or has("ENVIRONMENT") or has("BRANCH_NAME") or has("REPOSITORY_NAME") or has("ARTIFACTORY_BUCKET") or has("ANALYTICS_BUCKET") or has("AWS_ACCOUNT_ID") or has("AWS_ACCOUNT_ID_OPT") or has("DB_STAGE") or has("DB_ANALYTICS") or has("AWS_ACCOUNT") or has("AWS_RUTADIGITAL_ID") or has("DEVELOPER")) | keys[0]'); do
            value=$(echo "$JSON_CONTENT" | jq -r ".[] | select(has(\"$key\")) | .\"$key\"")
            echo "${key}=${value}" >> $GITHUB_ENV
            echo "Cargado: ${key}=${value}"
          done

          # Procesar ETA_CONFIG separadamente
          echo "$JSON_CONTENT" | jq -c '.[] | select(has("ETA_CONFIG"))' > /tmp/eta_config.json
          if [ -s /tmp/eta_config.json ]; then
            for key in $(cat /tmp/eta_config.json | jq -r '.ETA_CONFIG | keys[]'); do
              value=$(cat /tmp/eta_config.json | jq -r ".ETA_CONFIG.\"$key\"")
              echo "ETA_CONFIG_${key}=${value}" >> $GITHUB_ENV
              echo "Cargado: ETA_CONFIG_${key}=${value}"
            done
          fi
          
          # Procesar ETA_TOKENS separadamente
          echo "$JSON_CONTENT" | jq -c '.[] | select(has("ETA_TOKENS"))' > /tmp/eta_tokens.json
          if [ -s /tmp/eta_tokens.json ]; then
            for key in $(cat /tmp/eta_tokens.json | jq -r '.ETA_TOKENS | keys[]'); do
              value=$(cat /tmp/eta_tokens.json | jq -r ".ETA_TOKENS.\"$key\"")
              echo "ETA_TOKENS_${key}=${value}" >> $GITHUB_ENV
              echo "Cargado: ETA_TOKENS_${key}=${value}"
            done
          fi

          echo "Loaded variables from $PARAMETERS_FILE."

      - name: Process Tags
        run: |
          TAGS=$(jq -r 'map("\(.Key)=\(.Value|gsub(" "; "_")|gsub("&"; "and"))") | join(" ")' $PARAMETERS_TAG)
          echo "TAGS=${TAGS}" >> $GITHUB_ENV

      # Define common CloudFormation parameters
      - name: Set common parameters
        run: |
          echo "COMMON_PARAMS=pTeamName=$TEAM Stage=$ENVIRONMENT pBranchName=$BRANCH_NAME pdbAnalyticsName=$DB_ANALYTICS pArtifactsBucket=$ARTIFACTORY_BUCKET pAWSRegion=$REGION pAWSAccountId=$AWS_ACCOUNT_ID pAWSAccountOpt=$AWS_ACCOUNT_ID_OPT pdbStageName=$DB_STAGE pAccountName=$AWS_ACCOUNT pbucketAnalytics=$ANALYTICS_BUCKET pdeploymentDate=$TIMESTAMP pRDAWSAccountId=$AWS_RUTADIGITAL_ID pdeveloper=$DEVELOPER" >> $GITHUB_ENV

