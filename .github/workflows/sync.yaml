          aws cloudformation describe-stack-events --stack-name $STACK_NAME --max-items 5 --output table
      
      - name: Deploy Events
        id: events
        shell: bash
        if: contains(github.event.head_commit.message, '-events') || contains(github.event.head_commit.message, '-all')
        env:
          STACK_NAME: da-josemaria-events
        run: |
          aws cloudformation deploy --template-file templates/events.yaml \
            --region $REGION \
