  deploy-iam:
    if: contains(github.event.pull_request.title, '-iam') || contains(github.event.pull_request.title, '-all')
    needs: prepare-stacks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Deploy IAM Stack
        run: |
          aws cloudformation deploy \
            --template-file templates/iam.yml \
            --region us-east-1 \
            --stack-name da-ecodistribucion-iam \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides $COMMON_PARAMS

  deploy-s3:
    if: contains(github.event.pull_request.title, '-s3') || contains(github.event.pull_request.title, '-all')
    needs: deploy-iam
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Deploy S3 Stack
        run: |
          aws cloudformation deploy \
            --template-file templates/s3.yml \
            --region us-east-1 \
            --stack-name da-ecodistribucion-s3 \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides $COMMON_PARAMS 

  deploy-athenacatalogo:
    if: contains(github.event.pull_request.title, '-athenacatalogo') || contains(github.event.pull_request.title, '-all')
    needs: deploy-s3
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Deploy Athena Catalogo Stack
        run: |
          aws cloudformation deploy \
            --template-file templates/athenacatalogo.yml \
            --region us-east-1 \
            --stack-name da-ecodistribucion-athenacatalogo \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides $COMMON_PARAMS


     # Deploy stack based on matrix value
      - name: Deploy ${{ matrix.stack }} Stack
        run: |
          echo "Desplegando stack ${{ matrix.stack }}"
          
          # Variables específicas según el stack
          STACK_TEMPLATE=""
          STACK_NAME=""
          
          case "${{ matrix.stack }}" in
            "koa-da-ecodistribucion-eta")
              STACK_TEMPLATE="templates/koa-da-ecodistribucion-eta.yml"
              STACK_NAME="koa-da-ecodistribucion-eta"
              
              # Desplegar el stack ETA con parámetros específicos
              aws cloudformation deploy \
                --template-file $STACK_TEMPLATE \
                --region $REGION \
                --stack-name $STACK_NAME \
                --capabilities CAPABILITY_NAMED_IAM \
                --no-fail-on-empty-changeset \
                --tags $TAGS \
                --parameter-overrides \
                  $COMMON_PARAMS \
                  pEtaCronExpression="$ETA_CONFIG_CRON_EXPRESSION" \
                  pEtaMemorySizeMl="$ETA_CONFIG_MEMORY_SIZE_ML" \
                  pEtaMemorySizeSr="$ETA_CONFIG_MEMORY_SIZE_SR" \
                  pEtaMemorySizeConsolidado="$ETA_CONFIG_MEMORY_SIZE_CONSOLIDADO" \
                  pEtaTimeoutMl="$ETA_CONFIG_TIMEOUT_ML" \
                  pEtaTimeoutSr="$ETA_CONFIG_TIMEOUT_SR" \
                  pEtaTimeoutConsolidado="$ETA_CONFIG_TIMEOUT_CONSOLIDADO" \
                  pEtaheremapskey="$ETA_TOKENS_HEREMAPS_KEY" \
                  pEtaCarlosValdovinosSr="$ETA_TOKENS_CARLOS_VALDOVINOS_SR" \
                  pPuenteAltoSr="$ETA_TOKENS_PUENTE_ALTO_SR"
              ;;
            "koa-da-ecodistribucion-misupply")
              STACK_TEMPLATE="templates/koa-da-ecodistribucion-misupply.yml"
              STACK_NAME="koa-da-ecodistribucion-misupply"
              
              # Desplegar el stack Misupply
              aws cloudformation deploy \
                --template-file $STACK_TEMPLATE \
                --region $REGION \
                --stack-name $STACK_NAME \
                --capabilities CAPABILITY_NAMED_IAM \
                --no-fail-on-empty-changeset \
                --tags $TAGS \
                --parameter-overrides $COMMON_PARAMS
              ;;
            "koa-da-ecodistribucion-nps-feedback")
              STACK_TEMPLATE="templates/koa-da-ecodistribucion-nps-feedback.yml"
              STACK_NAME="koa-da-ecodistribucion-nps-feedback"
              
              # Desplegar el stack NPS Feedback
              aws cloudformation deploy \
                --template-file $STACK_TEMPLATE \
                --region $REGION \
                --stack-name $STACK_NAME \
                --capabilities CAPABILITY_NAMED_IAM \
                --no-fail-on-empty-changeset \
                --tags $TAGS \
                --parameter-overrides $COMMON_PARAMS
              ;;
            "koa-da-ecodistribucion-optimizador")
              STACK_TEMPLATE="templates/koa-da-ecodistribucion-optimizador.yml"
              STACK_NAME="koa-da-ecodistribucion-optimizador"
              
              # Desplegar el stack Optimizador
              aws cloudformation deploy \
                --template-file $STACK_TEMPLATE \
                --region $REGION \
                --stack-name $STACK_NAME \
                --capabilities CAPABILITY_NAMED_IAM \
                --no-fail-on-empty-changeset \
                --tags $TAGS \
                --parameter-overrides $COMMON_PARAMS
              ;;
            *)
              echo "Stack no reconocido: ${{ matrix.stack }}"
              exit 1
              ;;
          esac
          
          # Mostrar eventos recientes del stack
          aws cloudformation describe-stack-events \
            --stack-name $STACK_NAME \
            --max-items 5 \
            --output table