name: Sync File to S3

on:
  push:
    branches:
      - develop # Solo se ejecutará cuando haya cambios en la rama main

permissions:
  id-token: write
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      AWS_BUCKET_NAME: "prueba-exampe-josemaria-git"
      REGION: "us-east-1"
      ARTIFACTS_S3: "testa-artifacts-dev-josemaria"
      AWS_ACCOUNT_ID: "345345345345"
      AWS_ACCOUNT_OPTIMIZADOR: "5345345345"  
      ENVIRONMENT: "dev" 
    steps:

      - name: Checkout Repo
        uses: actions/checkout@v2

      - name: Set timestamp
        run: |
          echo "TIMESTAMP=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_ENV
      

      - name: Set Parameters File
        run: |
          if [[ "${{ github.ref_name }}" == "develop" ]]; then
            echo "PARAMETERS_FILE=./parameters-dev.json" >> $GITHUB_ENV
          elif [[ "${{ github.ref_name }}" == "qa" ]]; then
            echo "PARAMETERS_FILE=./parameters-qa.json" >> $GITHUB_ENV
          elif [[ "${{ github.ref_name }}" == "prod" ]]; then
            echo "PARAMETERS_FILE=./parameters-prod.json" >> $GITHUB_ENV
          else
            echo "PARAMETERS_FILE=tags.json" >> $GITHUB_ENV
          fi

      # Paso 2: Leer el JSON y exportar las claves como variables de entorno
      - name: Load JSON into Environment Variables
        run: |
          for row in $(jq -c '.[]' $PARAMETERS_FILE); do
            key=$(echo $row | jq -r 'keys[0]')
            value=$(echo $row | jq -r '.[]')
            echo "${key}=${value}" >> $GITHUB_ENV
          done
          echo "Loaded variables from $PARAMETERS_FILE."

      # Paso 3: Validar los valores cargados
      - name: Validate Variables
        run: |
          echo "TEAM=$TEAM"
          echo "ENVIRONMENT=$ENVIRONMENT"
          echo "BRANCH_NAME=$BRANCH_NAME"
          echo "REPOSITORY_NAME=$REPOSITORY_NAME"
          echo "ARTIFACTORY_BUCKET=$ARTIFACTORY_BUCKET"
          echo "AWS_ACCOUNT_ID=$AWS_ACCOUNT_ID"
          echo "AWS_ACCOUNT_ID_PRUEBA=$AWS_ACCOUNT_ID_PRUEBA"
          echo "DB_STAGE=$DB_STAGE"
          echo "AWS_ACCOUNT=$AWS_ACCOUNT"


      - name: Convert JSON to key=value format
        run: |
          # Leer el JSON
          JSON=$(cat tags.json)
          
          TAGS=$(echo "$JSON" | jq -r 'map_values(to_entries | map("\(.key)=\(.value)") | join(", "))')

          # Imprimir el resultado
          echo "$TAGS"





        # 2. Configura las credenciales de AWS
      - name: connect to AWS
        uses: aws-actions/configure-aws-credentials@v1
        with:
          role-session-name: awssyncsession
          role-to-assume: ${{ secrets.AWS_IAM_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      

      - name: Deploy S3
        id: s3
        shell: bash
        if: contains(github.event.head_commit.message, '-s3') || contains(github.event.head_commit.message, '-all')
        env:
          S3_STACK_NAME: da-josemaria-s3
        run: |
          aws cloudformation deploy --template-file templates/s3.yaml \
            --region $REGION \
            --stack-name $S3_STACK_NAME \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
                pTeamName=$TEAM \
                Stage=$ENVIRONMENT \
                pBranchName=$BRANCH_NAME \
                pArtifactsBucket=$ARTIFACTORY_BUCKET \
                pAWSRegion=$REGION \
                pAWSAccountId=$AWS_ACCOUNT_ID \
                pAWSAccountOptId=$AWS_ACCOUNT_ID_PRUEBA \
                pdbStageName=$DB_STAGE \
                pAccountName=$AWS_ACCOUNT \
                pdeploymentDate=$TIMESTAMP
          aws cloudformation describe-stack-events --stack-name $S3_STACK_NAME --max-items 5

      #- name: Sync Folder to S3
      #  id: sync-folder
      #  run: |
      #    aws s3 sync ./stage_lib s3://$AWS_BUCKET_NAME/
      #    echo "Folder synchronized to S3 bucket: $AWS_BUCKET_NAME"
      - name: Copy 'src' Folders and Zip lambda_function.py to S3
        id: process-src
        if: contains(github.event.head_commit.message, '-src') || contains(github.event.head_commit.message, '-all')
        run: |
          # Define el bucket S3
          BUCKET_NAME=$ARTIFACTS_S3

          # Encuentra todas las carpetas que contienen 'src'
          find stage_lib -type d -name 'src' | while read src_path; do
            # Recrear la ruta en S3
            s3_path=$(echo $src_path | sed "s|stage_lib|s3://$BUCKET_NAME|")
            aws s3api put-object --bucket $BUCKET_NAME --key "$(echo $s3_path | sed 's|s3://[^/]\+/||')/"

            # Copiar los archivos dentro del directorio 'src' a S3
            find "$src_path" -type f | while read file; do
              file_key=$(echo $file | sed "s|stage_lib|s3://$BUCKET_NAME|")
            done

            # Si existe un archivo lambda_function.py, zip y subir
            lambda_file="$src_path/lambda_function.py"
            if [ -f "$lambda_file" ]; then
              zip_file="$src_path/lambda_function.zip"
              zip -j "$zip_file" "$lambda_file"

              # Subir el archivo zip al S3
              zip_s3_path=$(echo $zip_file | sed "s|stage_lib|s3://$BUCKET_NAME|")
              aws s3 cp "$zip_file" "$zip_s3_path"

              # Eliminar el archivo ZIP local después de subirlo
              rm "$zip_file"
            fi
          done

          echo "All 'src' files copied and lambda_function.py zipped and uploaded to S3."
      - name: Deploy SQS
        id: SQS
        shell: bash
        if: contains(github.event.head_commit.message, '-sqs') || contains(github.event.head_commit.message, '-all')
        env:
          STACK_NAME: da-josemaria-sqs
        run: |
          aws cloudformation deploy --template-file templates/sqs.yaml \
            --region $REGION \
            --stack-name $STACK_NAME \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --s3-bucket prueba-exampe-josemaria-git \
            --parameter-overrides \
                pTeamName=$TEAM \
                Stage=$ENVIRONMENT \
                pBranchName=$BRANCH_NAME \
                pArtifactsBucket=$ARTIFACTORY_BUCKET \
                pAWSRegion=$REGION \
                pAWSAccountId=$AWS_ACCOUNT_ID \
                pAWSAccountOptId=$AWS_ACCOUNT_ID_PRUEBA \
                pdbStageName=$DB_STAGE \
                pAccountName=$AWS_ACCOUNT \
                pdeploymentDate=$TIMESTAMP
          aws cloudformation describe-stack-events --stack-name $STACK_NAME --max-items 5 --output table

      - name: Deploy IAM
        id: iam
        shell: bash
        if: contains(github.event.head_commit.message, '-iam') || contains(github.event.head_commit.message, '-all')
        env:
          STACK_NAME: da-josemaria-iam
        run: |
          aws cloudformation deploy --template-file templates/iam.yaml \
            --region $REGION \
            --stack-name $STACK_NAME \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
                pTeamName=$TEAM \
                Stage=$ENVIRONMENT \
                pBranchName=$BRANCH_NAME \
                pArtifactsBucket=$ARTIFACTORY_BUCKET \
                pAWSRegion=$REGION \
                pAWSAccountId=$AWS_ACCOUNT_ID \
                pAWSAccountOptId=$AWS_ACCOUNT_ID_PRUEBA \
                pdbStageName=$DB_STAGE \
                pAccountName=$AWS_ACCOUNT \
                pdeploymentDate=$TIMESTAMP
          aws cloudformation describe-stack-events --stack-name $STACK_NAME --max-items 5

      - name: Upload layers to S3
        if: contains(github.event.head_commit.message, '-layer') || contains(github.event.head_commit.message, '-all')
        run: |
          aws s3 cp ./layers/awswrangler-layer-py3-9.zip s3://$ARTIFACTS_S3/layers/
          aws s3 cp ./layers/request-layer-py3-12.zip s3://$ARTIFACTS_S3/layers/

          awswrangler_layer_py3_9_md5=$(md5sum ./layers/awswrangler-layer-py3-9.zip | awk '{print $1}')
          request_layer_py3_12_md5=$(md5sum ./layers/request-layer-py3-12.zip | awk '{print $1}')

          echo "awswranglerlayerpy39MD5=$awswrangler_layer_py3_9_md5" >> $GITHUB_ENV
          echo "requestlayerpy312MD5=$request_layer_py3_12_md5" >> $GITHUB_ENV
          
      - name: Deploy Lambda
        id: lambda
        shell: bash
        if: contains(github.event.head_commit.message, '-lambda') || contains(github.event.head_commit.message, '-all')
        env:
          STACK_NAME: da-josemaria-lambda
        run: |
          aws cloudformation deploy --template-file templates/lambda.yaml \
            --region $REGION \
