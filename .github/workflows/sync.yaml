            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --s3-bucket prueba-exampe-josemaria-git \
            --parameter-overrides \
                pTeamName=$TEAM \
                Stage=$ENVIRONMENT \
                pBranchName=$BRANCH_NAME \
                pArtifactsBucket=$ARTIFACTORY_BUCKET \
                pAWSRegion=$REGION \
                pAWSAccountId=$AWS_ACCOUNT_ID \
                pAWSAccountOptId=$AWS_ACCOUNT_ID_PRUEBA \
                pdbStageName=$DB_STAGE \
                pAccountName=$AWS_ACCOUNT \
                pdeploymentDate=$TIMESTAMP 
          aws cloudformation describe-stack-events --stack-name $STACK_NAME --max-items 5 --output table

      - name: Upload layers to S3
        if: contains(github.event.head_commit.message, '-layer') 
        run: |
          aws s3 cp ./layers/awswrangler-layer-py3-9.zip s3://$ARTIFACTORY_BUCKET/layers/
          aws s3 cp ./layers/request-layer-py3-12.zip s3://$ARTIFACTORY_BUCKET/layers/

          awswrangler_layer_py3_9_md5=$(md5sum ./layers/awswrangler-layer-py3-9.zip | awk '{print $1}')
          request_layer_py3_12_md5=$(md5sum ./layers/request-layer-py3-12.zip | awk '{print $1}')

          echo "awswranglerlayerpy39MD5=$awswrangler_layer_py3_9_md5" >> $GITHUB_ENV
          echo "requestlayerpy312MD5=$request_layer_py3_12_md5" >> $GITHUB_ENV

      - name: Deploy ATHENA
        id: athena
        shell: bash
        if: contains(github.event.head_commit.message, '-athena') || contains(github.event.head_commit.message, '-all')
        env:
