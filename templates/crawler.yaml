AWSTemplateFormatVersion: "2010-09-09"
Description: Template for creating AWS Proyecto Optimizador

Parameters:
  Stage:
    Type: String
    Description: Environment name (dev/qa/prod)
    AllowedValues: [dev, qa, prod]
  pBranchName:
    Description: "Branch Name(all lowercase, no symbols or spaces)"
    Type: String
  pArtifactsBucket:
    Description: "Artifact Bucket (all lowercase, no symbols or spaces)"
    Type: String
  pbucketAnalytics:
    Description: "Artifact Bucket (all lowercase, no symbols or spaces)"
    Type: String
  pAWSRegion:
    Description: "AWS region (all lowercase, no symbols or spaces)"
    Type: String
  pAWSAccountId:
    Description: "AWS account ID (all lowercase, no symbols or spaces)"
    Type: String
  pAWSAccountOpt:
    Description: "AWS account optimizador ID (all lowercase, no symbols or spaces)"
    Type: String
  pAccountName:
    Description: "AWS account name (all lowercase, no symbols or spaces)"
    Type: String
  pTeamName:
    Description: "Team Name (all lowercase, no symbols or spaces)"
    Type: String
  pdeploymentDate:
    Description: "Deployment date (all lowercase, no symbols or spaces)"
    Type: String
  pdbStageName:
    Description: "Database Stage name (all lowercase, no symbols or spaces)"
    Type: String
  pdbAnalyticsName:
    Description: "Database analytics name (all lowercase, no symbols or spaces)"
    Type: String
  pdeveloper:
    Description: "Database analytics name (all lowercase, no symbols or spaces)"
    Type: String
    Default: Josemaria_Paucar
  pRDAWSAccountId:
    Description: "Account Ruta Digital (all lowercase, no symbols or spaces)"
    Type: String
  # Country parameters
  pCountryCl:
    Description: "Country code for Chile"
    Type: String
    Default: "cl"
  pCountryPy:
    Description: "Country code for Paraguay"
    Type: String
    Default: "py"
  pCountryAr:
    Description: "Country code for Argentina"
    Type: String
    Default: "ar"
  pCountryBr:
    Description: "Country code for Brazil"
    Type: String
    Default: "br"
  pCountryRg:
    Description: "Country code for Regional"
    Type: String
    Default: "rg"
  # Required for referenced resources

Resources:  
  crawlerRoleAnalytics:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "role-${pTeamName}-crawler-${Stage}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              Service:
                - "glue.amazonaws.com"
            Action:
              - "sts:AssumeRole"
      Path: "/"
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole'
      Policies:
        - PolicyName: "S3BucketAccessPolicy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: "Allow"
                Action: 
                  - "s3:GetObject"
                  - "s3:PutObject"
                  - "s3:ListBucket"
                Resource: 
                  - !Sub "arn:aws:s3:::${pTeamName}-${pAccountName}-analytics-${Stage}/*"
                  - !Sub "arn:aws:s3:::${pTeamName}-${pAccountName}-analytics-${Stage}"
  
  # analyticsDbCrawler:
  #   Type: AWS::Glue::Crawler
  #   Properties:
  #     Name: !Sub "Glue-${pTeamName}-crawler-db-Analytics"
  #     Role: !GetAtt crawlerRoleAnalytics.Arn
  #     DatabaseName: !Ref pdbAnalyticsName
  #     Targets:
  #       S3Targets:
  #         - Path: !Sub "s3://${pbucketAnalytics}"
  #     SchemaChangePolicy:
  #       UpdateBehavior: "UPDATE_IN_DATABASE"
  #       DeleteBehavior: "LOG"
  #     Tags:
  #       develop: !Ref pdeveloper
  #     Schedule:
  #       ScheduleExpression: "cron(0 10 ? * * *)"
  #     Description: !Sub "Crawler to analyze data in ${pbucketAnalytics} bucket for ${Stage} environment"
  analyticsDbCrawlerRgInOptimizador:
    Type: AWS::Glue::Crawler
    Properties:
      Name: !Sub "Glue-${pTeamName}-crawler-rg-in-optimizador-analitycs"
      Role: !GetAtt crawlerRoleAnalytics.Arn
      DatabaseName: !Ref pdbAnalyticsName
      TablePrefix: -analytics
      Targets:
        S3Targets:
          - Path: !Sub "s3://${pbucketAnalytics}/regional/externa/rg_in_optimizador/"
      SchemaChangePolicy:
        UpdateBehavior: "UPDATE_IN_DATABASE"
        DeleteBehavior: "LOG"
      Tags:
        develop: !Ref pdeveloper
      Schedule:
        ScheduleExpression: "cron(0 10 ? * * *)"
      Description: !Sub "Crawler for rg_in_optimizador_analitycs in ${pbucketAnalytics} bucket for ${Stage} environment"
