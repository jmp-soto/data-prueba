AWSTemplateFormatVersion: "2010-09-09"
Description: Template for creating AWS Proyecto Optimizador

Parameters:
  Stage:
    Type: String
    Description: Environment name (dev/qa/prod)
    AllowedValues: [dev, qa, prod]
  pBranchName:
    Type: String
    Description: Branch Name (lowercase, no symbols or spaces)
  pArtifactsBucket:
    Type: String
    Description: Artifact Bucket (lowercase, no symbols or spaces)
  pbucketAnalytics:
    Type: String
    Description: Analytics Bucket (lowercase, no symbols or spaces)
  pAWSRegion:
    Type: String
    Description: AWS region (e.g., us-east-1)
  pAWSAccountId:
    Type: String
    Description: AWS account ID (12 digits)
  pAWSAccountOpt:
    Type: String
    Description: AWS account optimizador ID
  pAccountName:
    Type: String
    Description: AWS account name (lowercase, no symbols or spaces)
  pTeamName:
    Type: String
    Description: Team Name (lowercase, no symbols or spaces)
  pdeploymentDate:
    Type: String
    Description: Deployment date (YYYY-MM-DD)
  pdbStageName:
    Type: String
    Description: Database Stage name
  pdbAnalyticsName:
    Type: String
    Description: Database analytics name
  pdeveloper:
    Type: String
    Description: Developer name
    Default: Josemaria_Paucar
  pRDAWSAccountId:
    Type: String
    Description: Account Ruta Digital
  pCountryCl:
    Type: String
    Description: Country code for Chile
    Default: "cl"
  pCountryPy:
    Type: String
    Description: Country code for Paraguay
    Default: "py"
  pCountryAr:
    Type: String
    Description: Country code for Argentina
    Default: "ar"
  pCountryBr:
    Type: String
    Description: Country code for Brazil
    Default: "br"
  pCountryRg:
    Type: String
    Description: Country code for Regional
    Default: "rg"

Resources:

  DevTeamsNotifications:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: develop-teams-notifications

  # ---------- Lambda Functions ----------
  LambdaRoutesSimplirouteCL:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "Lambda-da-routes-simpliroute-${pCountryCl}"
      Handler: index.handler
      Role: !GetAtt LambdaSimpliRouteKpiRole.Arn
      Runtime: python3.12
      Timeout: 180
      MemorySize: 512
      Code:
        ZipFile: |
          import os
          def handler(event, context):
              desarrollador = os.getenv("DEVELOPER", "Desconocido")
              return {"statusCode": 200, "body": f"Hola mundo desde {desarrollador}", "input": event}
      Environment:
        Variables:
          ACCOUNT_ID: !Ref pAWSAccountId
          DEVELOPER: !Ref pdeveloper
      Tags:
        - Key: Developer
          Value: !Ref pdeveloper

  LambdaInvoicesSimplirouteCL:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "Lambda-da-invoices-simpliroute-${pCountryCl}"
      Handler: index.handler
      Role: !GetAtt LambdaSimpliRouteKpiRole.Arn
      Runtime: python3.12
      Timeout: 180
      MemorySize: 512
      Code:
        ZipFile: |
          import os
          def handler(event, context):
              desarrollador = os.getenv("DEVELOPER", "Desconocido")
              return {"statusCode": 200, "body": f"Hola mundo desde {desarrollador}", "input": event}
      Environment:
        Variables:
          ACCOUNT_ID: !Ref pAWSAccountId
          DEVELOPER: !Ref pdeveloper
      Tags:
        - Key: Developer
          Value: !Ref pdeveloper

  LambdaVisitsSimplirouteCL:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "Lambda-da-visits-simpliroute-${pCountryCl}"
      Handler: index.handler
      Role: !GetAtt LambdaSimpliRouteKpiRole.Arn
      Runtime: python3.12
      Timeout: 180
      MemorySize: 512
      Code:
        ZipFile: |
          import os
          def handler(event, context):
              desarrollador = os.getenv("DEVELOPER", "Desconocido")
              return {"statusCode": 200, "body": f"Hola mundo desde {desarrollador}", "input": event}
      Environment:
        Variables:
          ACCOUNT_ID: !Ref pAWSAccountId
          DEVELOPER: !Ref pdeveloper
      Tags:
        - Key: Developer
          Value: !Ref pdeveloper

  # ---------- IAM Roles ----------
  LambdaSimpliRouteKpiRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: LambdaSimpliRouteKpiRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  SMSimpliRouteKpiRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SMSimpliRouteKpiRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SMLambdaAndSNSPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !GetAtt LambdaRoutesSimplirouteCL.Arn
                  - !GetAtt LambdaInvoicesSimplirouteCL.Arn
                  - !GetAtt LambdaVisitsSimplirouteCL.Arn
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref DevTeamsNotifications
        - PolicyName: SMXRayPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                Resource: "*"

  # ---------- Step Functions State Machine ----------
  SMSimpliRouteKpi:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      RoleArn: !GetAtt SMSimpliRouteKpiRole.Arn
      StateMachineName: !Sub "sm-simpliroute-kpi-${pCountryCl}"
      TracingConfiguration:
        Enabled: true
      DefinitionString:
        !Sub |
          {
            "Comment": "Step Function ejecutando 3 Lambdas en paralelo con reintentos, timeouts y consolidación de resultados",
            "StartAt": "ParallelExecution",
            "States": {
              "ParallelExecution": {
                "Type": "Parallel",
                "Branches": [
                  {
                    "StartAt": "LambdaRoutes",
                    "States": {
                      "LambdaRoutes": {
                        "Type": "Task",
                        "Resource": "arn:aws:states:::lambda:invoke",
                        "TimeoutSeconds": 300,
                        "Parameters": {
                          "FunctionName": "${LambdaRoutesSimplirouteCL.Arn}",
                          "Payload.$": "$"
                        },
                        "OutputPath": "$.Payload",
                        "Retry": [
                          {
                            "ErrorEquals": [
                              "Lambda.ServiceException",
                              "Lambda.AWSLambdaException",
                              "Lambda.SdkClientException"
                            ],
                            "IntervalSeconds": 2,
                            "MaxAttempts": 3,
                            "BackoffRate": 2.0
                          }
                        ],
                        "End": true
                      }
                    }
                  },
                  {
                    "StartAt": "LambdaInvoices",
                    "States": {
                      "LambdaInvoices": {
                        "Type": "Task",
                        "Resource": "arn:aws:states:::lambda:invoke",
                        "TimeoutSeconds": 300,
                        "Parameters": {
                          "FunctionName": "${LambdaInvoicesSimplirouteCL.Arn}",
                          "Payload.$": "$"
                        },
                        "OutputPath": "$.Payload",
                        "Retry": [
                          {
                            "ErrorEquals": [
                              "Lambda.ServiceException",
                              "Lambda.AWSLambdaException",
                              "Lambda.SdkClientException"
                            ],
                            "IntervalSeconds": 2,
                            "MaxAttempts": 3,
                            "BackoffRate": 2.0
                          }
                        ],
                        "End": true
                      }
                    }
                  },
                  {
                    "StartAt": "LambdaVisits",
                    "States": {
                      "LambdaVisits": {
                        "Type": "Task",
                        "Resource": "arn:aws:states:::lambda:invoke",
                        "TimeoutSeconds": 300,
                        "Parameters": {
                          "FunctionName": "${LambdaVisitsSimplirouteCL.Arn}",
                          "Payload.$": "$"
                        },
                        "OutputPath": "$.Payload",
                        "Retry": [
                          {
                            "ErrorEquals": [
                              "Lambda.ServiceException",
                              "Lambda.AWSLambdaException",
                              "Lambda.SdkClientException"
                            ],
                            "IntervalSeconds": 2,
                            "MaxAttempts": 3,
                            "BackoffRate": 2.0
                          }
                        ],
                        "End": true
                      }
                    }
                  }
                ],
                "Next": "ConsolidateResults",
                "Catch": [
                  {
                    "ErrorEquals": ["States.ALL"],
                    "ResultPath": "$.ErrorInfo",
                    "Next": "ParseError"
                  }
                ]
              },

              "ConsolidateResults": {
                "Type": "Pass",
                "Parameters": {
                  "routes.$": "$[0]",
                  "invoices.$": "$[1]",
                  "visits.$": "$[2]"
                },
                "ResultPath": "$",
                "Next": "BuildSuccessMessage"
              },

              "BuildSuccessMessage": {
                "Type": "Pass",
                "Parameters": {
                  "SuccessMessage.$": "States.Format('Ejecución OK | Exec: {} | Routes: {} | Invoices: {} | Visits: {}', $$.Execution.Id, States.JsonToString($.routes), States.JsonToString($.invoices), States.JsonToString($.visits))"
                },
                "ResultPath": "$",
                "Next": "NotifySuccess"
              },

              "NotifySuccess": {
                "Type": "Task",
                "Resource": "arn:aws:states:::sns:publish",
                "Parameters": {
                  "TopicArn": "${DevTeamsNotifications}",
                  "Subject": "SFN sm-simpliroute-kpi - Éxito",
                  "Message.$": "$.SuccessMessage"
                },
                "Next": "SuccessState"
              },

              "ParseError": {
                "Type": "Pass",
                "Parameters": {
                  "ErrorInfo.$": "$.ErrorInfo",
                  "ParsedCause.$": "States.StringToJson($.ErrorInfo.Cause)"
                },
                "ResultPath": "$",
                "Next": "BuildFailureMessage"
              },

              "BuildFailureMessage": {
                "Type": "Pass",
                "Parameters": {
                  "FailureMessage.$": "States.Format('Falla en {}: {} | Msg: {} | Exec: {}', $$.State.Name, $.ErrorInfo.Error, $.ParsedCause.errorMessage, $$.Execution.Id)"
                },
                "ResultPath": "$",
                "Next": "NotifyFailure"
              },

              "NotifyFailure": {
                "Type": "Task",
                "Resource": "arn:aws:states:::sns:publish",
                "Parameters": {
                  "TopicArn": "${DevTeamsNotifications}",
                  "Subject": "SFN sm-simpliroute-kpi - Falla",
                  "Message.$": "$.FailureMessage"
                },
                "Next": "FailState"
              },

              "SuccessState": { "Type": "Succeed" },

              "FailState": {
                "Type": "Fail",
                "Error": "StepFunctionFailed",
                "Cause": "Una Lambda falló incluso después de reintentos"
              }
            }
          }

EventRuleSMRole:
  Type: AWS::IAM::Role
  Properties:
    AssumeRolePolicyDocument:
      Version: "2012-10-17"
      Statement:
        - Effect: Allow
          Principal:
            Service: events.amazonaws.com
          Action: sts:AssumeRole
    Policies:
      - PolicyName: AllowStartExecution
        PolicyDocument:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action: states:StartExecution
              Resource: !Ref SMSimpliRouteKpi

SMfnEventRule:
  Type: AWS::Events::Rule
  Properties:
    ScheduleExpression: "cron(0 11 * * ? *)"
    State: ENABLED
    Targets:
      - Id: !Sub "target-sfn-${pCountryCl}"
        Arn: !Ref SMSimpliRouteKpi
        RoleArn: !GetAtt EventRuleStartSfnRole.Arn