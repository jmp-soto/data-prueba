AWSTemplateFormatVersion: 2010-09-09

Parameters:
  Stage:
    Type: String
    Description: Environment name (dev/qa/prod)
    Default: dev
  pBranchName:
    Description: "Branch Name(all lowercase, no symbols or spaces)"
    Type: String
  pArtifactsBucket:
    Description: "Artifact Bucket (all lowercase, no symbols or spaces)"
    Type: String
  pAWSRegion:
    Description: "Aws region (all lowercase, no symbols or spaces)"
    Type: String
  pAWSAccountId:
    Description: "Aws account (all lowercase, no symbols or spaces)"
    Type: String
  pAWSAccountOptId:
    Description: "Aws account optimizador Id(all lowercase, no symbols or spaces)"
    Type: String
  pAccountName:
    Description: "Aws account (all lowercase, no symbols or spaces)"
    Type: String
  pTeamName:
    Description: "Aws account (all lowercase, no symbols or spaces)"
    Type: String
  pdeploymentDate:
    Description: "Aws account (all lowercase, no symbols or spaces)"
    Type: String

Resources:
  myLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "function-${Stage}"
      Description: "Lambda function desplegada dinámicamente"
      MemorySize: 256
      Timeout: 30
      Code:
        S3Bucket: !ImportValue da-ArtifactsBucketlibName
        S3Key:  lambda/stage_misupply/src/lambda_function.zip
      Role: !ImportValue LambdaMisupplyRole-Arn
      Handler: lambda_function.lambda_handler
      Runtime: python3.9
      Environment:
        Variables:
          ENVIRONMENT: !Ref Stage
          REGION: !Ref pAWSRegion
      Layers:
        - !Ref dataWranglerLayer
        - !Ref requestLayer

  myLambdaFunctiontuca:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "function-${Stage}-prueba"
      Description: "Lambda function desplegada dinámicamente"
      MemorySize: 256
      Timeout: 30
      Code:
        S3Bucket: !ImportValue da-ArtifactsBucketlibName
        S3Key:  lambda/stage_optimizador/src/lambda_function.zip
      Role: !ImportValue LambdaMioptimizadorRole-Arn
      Handler: lambda_function.lambda_handler
      Runtime: python3.9
      Environment:
        Variables:
          ENVIRONMENT: !Ref Stage
          REGION: !Ref pAWSRegion
      Layers:
        - !Ref dataWranglerLayer
        - !Ref requestLayer

  
  dataWranglerLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      CompatibleRuntimes:
        - python3.9
      Content:
        S3Bucket: !ImportValue da-ArtifactsBucketlibName
        S3Key: layers/awswrangler-layer-py3-9.zip
      Description: Data Wrangler Layer for Python 3.9
      LayerName: !Sub awswrangler-layer-py3-9-${Stage}

  requestLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      CompatibleRuntimes:
        - python3.12
      Content:
        S3Bucket: !ImportValue da-ArtifactsBucketlibName
        S3Key: layers/request-layer-py3-12.zip
      Description: Request Layer for Python 3.12
      LayerName: !Sub request-py3-12-${Stage}





Outputs: 
  myLambdaFunction:
    Description: myLambdaFunction Arn
    Value: !GetAtt myLambdaFunction.Arn
    Export:
      Name: DA-myLambdaFunctionArn

