AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Parameters:
  Stage:
    Type: String
    Description: Environment name (dev/qa/prod)
    Default: dev
  pBranchName:
    Description: "Branch Name(all lowercase, no symbols or spaces)"
    Type: String
  pArtifactsBucket:
    Description: "Artifact Bucket (all lowercase, no symbols or spaces)"
    Type: String
  pAWSRegion:
    Description: "Aws region (all lowercase, no symbols or spaces)"
    Type: String
  pAWSAccountId:
    Description: "Aws account (all lowercase, no symbols or spaces)"
    Type: String
  pAWSAccountOptId:
    Description: "Aws account optimizador Id(all lowercase, no symbols or spaces)"
    Type: String
  pAccountName:
    Description: "Aws account (all lowercase, no symbols or spaces)"
    Type: String
  pTeamName:
    Description: "Aws account (all lowercase, no symbols or spaces)"
    Type: String
  pdeploymentDate:
    Description: "Aws account (all lowercase, no symbols or spaces)"
    Type: String

  pRDAWSAccountId:
    Description: "Aws account (all lowercase, no symbols or spaces)"
    Type: String
    Default: 681689809494


Resources:
  daEtaSpLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "lambda-${pTeamName}-eta-sp"
      Description: "Lambda function Eta SimplyRoute"
      MemorySize: 2048
      Timeout: 900
      Code:
        ZipFile: |
          import json

          def handler(event, context):
              print("Hola Mundo desde Lambda!")
              return {
                  "statusCode": 200,
                  "body": json.dumps({
                      "message": "Hola Mundo!",
                      "event": event
                  })
              }
      Role: !ImportValue lambdaMisupplyApiRole-Arn
      Handler: lambda_function.lambda_handler
      Runtime: python3.9
      Environment:
        Variables:
          ENVIRONMENT: !Ref Stage
          REGION: !Ref pAWSRegion
      Layers:
        - !Ref dataWranglerLayer
        - !Ref requestLayer
  
  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt daEtaSpLambda.Arn
      Action: "lambda:InvokeFunction"
      Principal: !Sub "arn:aws:iam::${pRDAWSAccountId}:root"
      SourceAccount: !Ref pRDAWSAccountId
  
  daEtaSMlLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "lambda-${pTeamName}-eta-ml"
      Description: "Lambda function Modelo para obtener ETA"
      MemorySize: 2048
      Timeout: 900
      Code:
        ZipFile: |
          import json

          def handler(event, context):
              print("Hola Mundo desde Lambda!")
              return {
                  "statusCode": 200,
                  "body": json.dumps({
                      "message": "Hola Mundo!",
                      "event": event
                  })
              }
      Role: !ImportValue lambdaMisupplyApiRole-Arn
      Handler: lambda_function.lambda_handler
      Runtime: python3.9
      Environment:
        Variables:
          ENVIRONMENT: !Ref Stage
          REGION: !Ref pAWSRegion
      Layers:
        - !Ref dataWranglerLayer
        - !Ref requestLayer

  daEtaSMlLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "lambda-${pTeamName}-eta-ml"
      Description: "Lambda function Modelo para obtener ETA"
      MemorySize: 2048
      Timeout: 900
      Code:
        ZipFile: |
          import json

          def handler(event, context):
              print("Hola Mundo desde Lambda!")
              return {
                  "statusCode": 200,
                  "body": json.dumps({
                      "message": "Hola Mundo!",
                      "event": event
                  })
              }
      Role: !ImportValue lambdaMisupplyApiRole-Arn
      Handler: lambda_function.lambda_handler
      Runtime: python3.9
      Environment:
        Variables:
          ENVIRONMENT: !Ref Stage
          REGION: !Ref pAWSRegion
      Layers:
        - !Ref dataWranglerLayer
        - !Ref requestLayer


  dataWranglerLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      CompatibleRuntimes:
        - python3.9
      Content:
        S3Bucket: !Ref pArtifactsBucket
        S3Key: layers/awswrangler-layer-py3-9.zip
      Description: !Sub da datawrangler Layer - ${Stage}
      LayerName: !Sub awswrangler-layer-py3-9-${Stage}  
  
  requestLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      CompatibleRuntimes:
        - python3.9
      Content:
        S3Bucket: !Ref pArtifactsBucket
        S3Key: layers/request-layer-py3-12.zip
      Description: !Sub da request Layer - ${Stage}
      LayerName: !Sub request-layer-py3-12-${Stage}
  
  

  



