AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Parameters:
  Stage:
    Type: String
    Description: Environment name (dev/qa/prod)
    Default: dev
  pBranchName:
    Description: "Branch Name(all lowercase, no symbols or spaces)"
    Type: String
  pArtifactsBucket:
    Description: "Artifact Bucket (all lowercase, no symbols or spaces)"
    Type: String
  pAWSRegion:
    Description: "Aws region (all lowercase, no symbols or spaces)"
    Type: String
  pAWSAccountId:
    Description: "Aws account (all lowercase, no symbols or spaces)"
    Type: String
  pAWSAccountOptId:
    Description: "Aws account optimizador Id(all lowercase, no symbols or spaces)"
    Type: String
  pAccountName:
    Description: "Aws account (all lowercase, no symbols or spaces)"
    Type: String
  pTeamName:
    Description: "Aws account (all lowercase, no symbols or spaces)"
    Type: String
  pdeploymentDate:
    Description: "Aws account (all lowercase, no symbols or spaces)"
    Type: String
  pRDAWSAccountId:
    Description: "Aws account (all lowercase, no symbols or spaces)"
    Type: String
    Default: 681689809494


Resources:

  dataWranglerLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      CompatibleRuntimes:
        - python3.9
      Content:
        S3Bucket: !Ref pArtifactsBucket
        S3Key: layers/awswrangler-layer-py3-9.zip
      Description: !Sub da datawrangler Layer - ${Stage}
      LayerName: !Sub awswrangler-layer-py3-9-${Stage}  
  
  requestLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      CompatibleRuntimes:
        - python3.9
      Content:
        S3Bucket: !Ref pArtifactsBucket
        S3Key: layers/request-layer-py3-12.zip
      Description: !Sub da request Layer - ${Stage}
      LayerName: !Sub request-layer-py3-12-${Stage}
  
  
  # Lambda layers
  dataWranglerLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: !Sub "${pTeamName}-data-wrangler-layer"
      Description: "Data Wrangler Layer for Lambda functions"
      CompatibleRuntimes:
        - python3.9
      Content:
        S3Bucket: !Ref pArtifactsBucket
        S3Key: !Sub "layers/data_wrangler_layer.zip"

  requestLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: !Sub "${pTeamName}-request-layer"
      Description: "Request Layer for Lambda functions"
      CompatibleRuntimes:
        - python3.9
      Content:
        S3Bucket: !Ref pArtifactsBucket
        S3Key: !Sub "layers/request_layer.zip"

  



