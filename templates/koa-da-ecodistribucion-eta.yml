AWSTemplateFormatVersion: "2010-09-09"
Description: Template for creating AWS Proyecto Eta

Parameters:
  Stage:
    Type: String
    Description: Environment name (dev/qa/prod)
    AllowedValues: [dev, qa, prod]
  pBranchName:
    Description: "Branch Name(all lowercase, no symbols or spaces)"
    Type: String
  pArtifactsBucket:
    Description: "Artifact Bucket (all lowercase, no symbols or spaces)"
    Type: String
  pbucketAnalytics:
    Description: "Artifact Bucket (all lowercase, no symbols or spaces)"
    Type: String
  pAWSRegion:
    Description: "AWS region (all lowercase, no symbols or spaces)"
    Type: String
  pAWSAccountId:
    Description: "AWS account ID (all lowercase, no symbols or spaces)"
    Type: String
  pAWSAccountOpt:
    Description: "AWS account optimizador ID (all lowercase, no symbols or spaces)"
    Type: String
  pAccountName:
    Description: "AWS account name (all lowercase, no symbols or spaces)"
    Type: String
  pTeamName:
    Description: "Team Name (all lowercase, no symbols or spaces)"
    Type: String
  pdeploymentDate:
    Description: "Deployment date (all lowercase, no symbols or spaces)"
    Type: String
  pdbStageName:
    Description: "Database Stage name (all lowercase, no symbols or spaces)"
    Type: String
  pdbAnalyticsName:
    Description: "Database analytics name (all lowercase, no symbols or spaces)"
    Type: String
  pdeveloper:
    Description: "Database analytics name (all lowercase, no symbols or spaces)"
    Type: String
    Default: "Josemaria_Paucar"
  pRDAWSAccountId:
    Description: "Account Ruta Digital (all lowercase, no symbols or spaces)"
    Type: String
  # País parameters
  pCountryCl:
    Description: "Country code for Chile"
    Type: String
    Default: "cl"
  pCountryPy:
    Description: "Country code for Paraguay"
    Type: String
    Default: "py"
  pCountryAr:
    Description: "Country code for Argentina"
    Type: String
    Default: "ar"
  pCountryBr:
    Description: "Country code for Brazil"
    Type: String
    Default: "br"
  pCountryRg:
    Description: "Country code for Regional"
    Type: String
    Default: "rg"
  # Required for referenced resources
  pAccountAwsLayer:
    Description: "Id account layer for AWS Wrangler"
    Type: String
    Default: 336392948345
  # Nuevos parámetros para configuración dinámica
  pEtaCronExpression:
    Description: "Expresión cron para la programación del consolidado ETA"
    Type: String
    Default: "cron(0 7 * * ? *)"
  pEtaMemorySizeMl:
    Description: "Tamaño de memoria para la función Lambda ML de ETA"
    Type: Number
    Default: 2048
  pEtaMemorySizeSr:
    Description: "Tamaño de memoria para la función Lambda SR de ETA"
    Type: Number
    Default: 2048
  pEtaMemorySizeConsolidado:
    Description: "Tamaño de memoria para la función Lambda de consolidado ETA"
    Type: Number
    Default: 1024
  pEtaTimeoutMl:
    Description: "Timeout para la función Lambda ML de ETA"
    Type: Number
    Default: 900
  pEtaTimeoutSr:
    Description: "Timeout para la función Lambda SR de ETA"
    Type: Number
    Default: 900
  pEtaTimeoutConsolidado:
    Description: "Timeout para la función Lambda de consolidado ETA"
    Type: Number
    Default: 360
  pEtaheremapskey:
    Description: "Token Api Heremaps"
    Type: String
  pEtaCarlosValdovinosSr:
    Description: "Token Centro de distribucion Carlos Valdovino SR"
    Type: String
  pPuenteAltoSr:
    Description: "Token Centro de distribucion Puenta Alto SR"
    Type: String

Mappings:
  center:
    dev:
      default: "puente-alto"
    qa:
      default: "carlos-valdovinos"
    prod:
      default: "puente-alto"

#Conditions:
#  IsDev: !Equals [!Ref Stage, "dev"]
Resources:
  projectEtaClRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "Role-${pTeamName}-Eta-${pCountryCl}"
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole"
        - "arn:aws:iam::aws:policy/AmazonSNSFullAccess"
        - "arn:aws:iam::aws:policy/AmazonAthenaFullAccess"
        - "arn:aws:iam::aws:policy/SecretsManagerReadWrite"
        - "arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess"
        - "arn:aws:iam::aws:policy/CloudWatchLogsFullAccess"
        - "arn:aws:iam::aws:policy/AmazonS3FullAccess"
      MaxSessionDuration: 43200
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              Service:
                - "glue.amazonaws.com"
                - "lambda.amazonaws.com"
            Action:
              - "sts:AssumeRole"
      Path: "/"
      Policies:
        - PolicyName: !Sub "${pTeamName}-access-to-s3-policy-bucketfile"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: AccessToS3Policy
                Effect: Allow
                Action: s3:*
                Resource:
                  - !Sub "arn:aws:s3:::${pTeamName}-${pAccountName}-stage-file-${Stage}/*"
              - Sid: ReadSecretsManager
                Effect: Allow
                Action:
                  - "secretsmanager:GetSecretValue"
                  - "secretsmanager:DescribeSecret"
                  - "secretsmanager:ListSecrets"
                Resource:
                  - !Sub "arn:aws:secretsmanager:${pAWSRegion}:${pAWSAccountId}:secret:*"
              - Sid: AccessTosqsPolicy
                Effect: Allow
                Action:
                  - "sqs:ReceiveMessage"
                  - "sqs:DeleteMessage"
                  - "sqs:GetQueueAttributes"
                  - "sqs:GetQueueUrl"
                  - "sqs:SendMessage"
                Resource:
                  - "*"
              - Sid: AccessToLogsPolicy
                Effect: Allow
                Action:
                  - "logs:CreateLogGroup"
                  - "logs:CreateLogStream"
                  - "logs:PutLogEvents"
                Resource: "arn:aws:logs:*:*:*"

  etaCLDynamo:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "table-${pTeamName}-eta-${pCountryCl}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: route_id
          AttributeType: S
        - AttributeName: process_date
          AttributeType: S
      KeySchema:
        - AttributeName: route_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: process_date
          KeySchema:
            - AttributeName: process_date
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: develop
          Value: !Ref pdeveloper

  etaDetailCLDynamo:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "table-${pTeamName}-eta-detail-${pCountryCl}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: route_id
          AttributeType: S
        - AttributeName: process_date
          AttributeType: S
      KeySchema:
        - AttributeName: route_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: process_date
          KeySchema:
            - AttributeName: process_date
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: develop
          Value: !Ref pdeveloper

  # Recurso para almacenar los tokens de API en Secrets Manager
  etaCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    UpdateReplacePolicy: Retain
    DeletionPolicy: Retain
    Properties:
      Name: "eta-credentials"
      Description: "Credenciales para APIs utilizadas en ETA (SimpleRoute)"
      SecretString: !Sub |
        {
          "carlos-valdovinos": {
            "simpliroute_token": "${pEtaCarlosValdovinosSr}"
          },
          "puente-alto": {
            "simpliroute_token": "${pPuenteAltoSr}"
          }
        }
      Tags:
        - Key: develop
          Value: !Ref pdeveloper
        - Key: Name
          Value: !Sub "eta-credentials-${pTeamName}-${Stage}"
        - Key: Environment
          Value: !Ref Stage
        - Key: Team
          Value: !Ref pTeamName
        - Key: Account
          Value: !Ref pAccountName
  
  etaCredentialsSecretApiHereMaps:
    Type: AWS::SecretsManager::Secret
    UpdateReplacePolicy: Retain
    DeletionPolicy: Retain
    Properties:
      Name: "api-heremaps-credentials"
      Description: "Credenciales para APIs Here maps"
      SecretString: !Sub |
        {
          "heremaps-api-key": "${pEtaheremapskey}"
        }
      Tags:
        - Key: develop
          Value: !Ref pdeveloper
        - Key: Name
          Value: !Sub "eta-credentials-${pTeamName}-${Stage}"
        - Key: Environment
          Value: !Ref Stage
        - Key: Team
          Value: !Ref pTeamName
        - Key: Account
          Value: !Ref pAccountName

  etaSrCLLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "Lambda-${pTeamName}-sr-eta-${pCountryCl}"
      Handler: lambda_function.lambda_handler
      Role: !GetAtt projectEtaClRole.Arn
      Runtime: python3.12
      Timeout: !Ref pEtaTimeoutSr
      MemorySize: !Ref pEtaMemorySizeSr
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return {
                  "statusCode": 200,
                  "body": "hola koandina"
              }
      Environment:
        Variables:
          DYNAMO_TABLE_ETA: !Ref etaCLDynamo
          DYNAMO_TABLE_ETA_DETAIL: !Ref etaDetailCLDynamo
          ACCOUNT_ID: !Ref pAWSAccountId
          ETA_SECRETS_NAME: !Ref etaCredentialsSecret
          CENTRO: !FindInMap [center, !Ref Stage, default]
      Tags:
        - Key: develop
          Value: !Ref pdeveloper

  etaSrCLLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt etaSrCLLambda.Arn
      Action: "lambda:InvokeFunction"
      Principal: !Sub "arn:aws:iam::${pRDAWSAccountId}:root"
      SourceAccount: !Ref pRDAWSAccountId

  LambdaInvokePermissionSaveSNSMiRuta:
  Type: AWS::Lambda::Permission
  Properties:
    FunctionName: !GetAtt etaSrCLLambda.Arn
    Action: lambda:InvokeFunction
    Principal: sns.amazonaws.com
    SourceArn: !Sub "arn:aws:sns:us-east-1:${pRDAWSAccountId}:sns-event-save-order-cl"

  SaveSNSMiRutaSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: lambda
      Endpoint: !GetAtt etaSrCLLambda.Arn
      TopicArn: !Sub "arn:aws:sns:us-east-1:${pRDAWSAccountId}:sns-event-save-order-cl"

  LambdaInvokePermissionRegisterSNSMiRuta:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt etaSrCLLambda.Arn
      Action: lambda:InvokeFunction
      Principal: sns.amazonaws.com
      SourceArn: !Sub "arn:aws:sns:us-east-1:${pRDAWSAccountId}:mi-ruta-sns-event-register-event-route-cl"

  RegisterSNSMiRutaSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: lambda
      Endpoint: !GetAtt etaSrCLLambda.Arn
      TopicArn: !Sub "arn:aws:sns:us-east-1:${pRDAWSAccountId}:mi-ruta-sns-event-register-event-route-cl"

  etaMlCLLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "Lambda-${pTeamName}-ml-eta-${pCountryCl}"
      Handler: lambda_function.lambda_handler
      Role: !GetAtt projectEtaClRole.Arn
      Runtime: python3.12
      Timeout: !Ref pEtaTimeoutMl
      MemorySize: !Ref pEtaMemorySizeMl
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return {
                  "statusCode": 200,
                  "body": "hola koandina"
              }
      Environment:
        Variables:
          DYNAMO_TABLE_ETA: !Ref etaCLDynamo
          DYNAMO_TABLE_ETA_DETAIL: !Ref etaDetailCLDynamo
          ACCOUNT_ID: !Ref pAWSAccountId
          ETA_SECRETS_NAME: !Ref etaCredentialsSecretApiHereMaps
      Layers:
        - !Sub "arn:aws:lambda:${pAWSRegion}:${pAccountAwsLayer}:layer:AWSSDKPandas-Python312:16"
      Tags:
        - Key: develop
          Value: !Ref pdeveloper

  taMlCLSqsDeadLetter:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "sqs-dlq-${pTeamName}-ml-eta-${pCountryCl}"

  taMlCLSqs:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "sqs-${pTeamName}-ml-eta-${pCountryCl}"
      VisibilityTimeout: 900
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt taMlCLSqsDeadLetter.Arn
        maxReceiveCount: 3
      Tags:
        - Key: develop
          Value: !Ref pdeveloper

  taMlCLSqsMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt taMlCLSqs.Arn
      FunctionName: !GetAtt etaMlCLLambda.Arn
      BatchSize: 1
      Enabled: true

  consolidadoetaCLLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "Lambda-${pTeamName}-eta-consolidado-${pCountryCl}"
      Handler: lambda_function.lambda_handler
      Role: !GetAtt projectEtaClRole.Arn
      Runtime: python3.12
      Timeout: !Ref pEtaTimeoutConsolidado
      MemorySize: !Ref pEtaMemorySizeConsolidado
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return {
                  "statusCode": 200,
                  "body": "hola koandina"
              }
      Environment:
        Variables:
          ACCOUNT_ID: !Ref pRDAWSAccountId
          DYNAMO_TABLE_ETA: !Ref etaCLDynamo
          DYNAMO_TABLE_ETA_DETAIL: !Ref etaDetailCLDynamo
          BUCKET_STAGE: !Sub "da-ecodistribucion-analytics-${Stage}"
      Layers:
        - !Sub "arn:aws:lambda:${pAWSRegion}:${pAccountAwsLayer}:layer:AWSSDKPandas-Python312:16"
      Tags:
        - Key: develop
          Value: !Ref pdeveloper

  etaConsolidadoClEventRule:
      Type: AWS::Events::Rule
      Properties:
        ScheduleExpression: !Ref pEtaCronExpression
        State: "ENABLED"
        Targets:
          - Id: !Sub "Eventrule-${pTeamName}-eta-consolidado"
            Arn: !GetAtt consolidadoetaCLLambda.Arn

  etaConsolidadoClLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt consolidadoetaCLLambda.Arn
      Action: "lambda:InvokeFunction"
      Principal: "events.amazonaws.com"
      SourceArn: !GetAtt etaConsolidadoClEventRule.Arn

