AWSTemplateFormatVersion: 2010-09-09

Parameters:
  Stage:
    Type: String
    Description: Environment name (dev/qa/prod)
    Default: dev
  pBranchName:
    Description: "Branch Name(all lowercase, no symbols or spaces)"
    Type: String
  pArtifactsBucket:
    Description: "Artifact Bucket (all lowercase, no symbols or spaces)"
    Type: String
  pAWSRegion:
    Description: "Aws region (all lowercase, no symbols or spaces)"
    Type: String
  pAWSAccountId:
    Description: "Aws account (all lowercase, no symbols or spaces)"
    Type: String
  pAWSAccountOptId:
    Description: "Aws account optimizador Id(all lowercase, no symbols or spaces)"
    Type: String
  pAccountName:
    Description: "Aws account (all lowercase, no symbols or spaces)"
    Type: String
  pTeamName:
    Description: "Aws account (all lowercase, no symbols or spaces)"
    Type: String
  pdeploymentDate:
    Description: "Aws account (all lowercase, no symbols or spaces)"
    Type: String
  pdbStageName:
    Description: "Aws account (all lowercase, no symbols or spaces)"
    Type: String
  pdbAnalyticsName:
    Description: "AWS database Analytics (all lowercase, no symbols or spaces)"
    Type: String
    Default: "db_ecodistribucion_regional_analitycs"
Resources:
  BrScThanosPalletsHeadersAnalytics:
    Properties:
      CatalogId: !Ref pAWSAccountId
      DatabaseName: !Ref pdbAnalyticsName
      TableInput:
        Name: rg_in_optimizador_analitycs
        TableType: EXTERNAL_TABLE
        Parameters:
          "classification": "json"
          "compressionType": "SNAPPY"
          "projection.enabled": "true"
          "projection.year.type": "integer"
          "projection.year.digits": "4"
          "projection.year.range": "2023,2035"
          "projection.month.type": "integer"
          "projection.month.digits": "2"
          "projection.month.range": "01,12"
          "projection.day.type": "integer"
          "projection.day.digits": "2"
          "projection.day.range": "01,31"
        PartitionKeys:
        - {Name: year, Type: string}
        - {Name: month, Type: string}
        - {Name: day, Type: string}
        StorageDescriptor:
          OutputFormat: org.apache.hadoop.hive.ql.io.parquet.MapredParquetOutputFormat
          Columns:
            - {Name: plan_id, Type: bigint}
            - {Name: plan_created_at, Type: timestamp}
            - {Name: plan_bukrs, Type: string}
            - {Name: plan_profile, Type: string}
            - {Name: plan_tpp, Type: string}
            - {Name: plan_date, Type: date}
            - {Name: plan_user_id, Type: int}
            - {Name: plan_description, Type: string}
            - {Name: calc_id, Type: bigint}
            - {Name: calc_created_at, Type: timestamp}
            - {Name: calc_bukrs, Type: string}
            - {Name: calc_ptot, Type: int}
            - {Name: calc_ptotm, Type: int}
            - {Name: calc_ptotc, Type: int}
            - {Name: calc_tknumr, Type: string}
            - {Name: calc_ptotr, Type: int}
            - {Name: calc_clients, Type: int}
            - {Name: calc_utilization, Type: string}
            - {Name: calc_peso, Type: string}
            - {Name: calc_utilizationp, Type: string}
            - {Name: calc_exception_sap, Type: string}
            - {Name: calc_status, Type: string}
            - {Name: calc_transactionid, Type: string}
            - {Name: calc_transactionidexport, Type: string}
            - {Name: calc_ntrip, Type: int}
            - {Name: calc_truck, Type: string}
            - {Name: calc_truck_box, Type: string}
            - {Name: calc_delivery_pallet, Type: string}
            - {Name: calc_user_comments, Type: string}
            - {Name: calc_planheader_id, Type: bigint}
            - {Name: sap_bukrs, Type: string}
            - {Name: sap_tknum, Type: string}
            - {Name: sap_shtyp, Type: string}
            - {Name: sap_tplst, Type: string}
            - {Name: sap_erdat, Type: timestamp}
            - {Name: sap_route, Type: string}
            - {Name: sap_tdlnr, Type: string}
            - {Name: sap_rpfar1, Type: string}
            - {Name: sap_rpmowa, Type: string}
            - {Name: sap_stdis, Type: string}
          InputFormat: org.apache.hadoop.hive.ql.io.parquet.MapredParquetInputFormat
          Location: !Sub s3://stage-nelson-${Stage}/regional/externa/rg_in_optimizador_stage
          Compressed: True
          SerdeInfo:
            SerializationLibrary: org.apache.hadoop.hive.ql.io.parquet.serde.ParquetHiveSerDe
    Type: AWS::Glue::Table


  MyGlueRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: glueprueba
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              Service: 'glue.amazonaws.com'
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: 'MyGluePolicy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: 'Allow'
                Action:
                  - 'glue:*'
                  - 's3:GetBucketLocation'
                  - 's3:ListBucket'
                  - 's3:ListAllMyBuckets'
                  - 's3:GetBucketAcl'
                  - 'ec2:DescribeVpcEndpoints'
                  - 'ec2:DescribeRouteTables'
                  - 'ec2:DescribeNetworkInterfaces'
                  - 'ec2:DescribeSecurityGroups'
                  - 'ec2:DescribeSubnets'
                  - 'ec2:DescribeVpcAttribute'
                  - 'iam:ListRolePolicies'
                  - 'iam:GetRole'
                  - 'iam:GetRolePolicy'
                  - 'cloudwatch:PutMetricData'
                Resource: '*'
              - Effect: 'Allow'
                Action: 's3:CreateBucket'
                Resource:
                  - 'arn:aws:s3:::aws-glue-*'
              - Effect: 'Allow'
                Action:
                  - 's3:GetObject'
                  - 's3:PutObject'
                  - 's3:DeleteObject'
                Resource:
                  - 'arn:aws:s3:::aws-glue-*/*'
                  - 'arn:aws:s3:::*/*aws-glue-*/*'
              - Effect: 'Allow'
                Action: 's3:GetObject'
                Resource:
                  - 'arn:aws:s3:::crawler-public*'
                  - 'arn:aws:s3:::aws-glue-*'
              - Effect: 'Allow'
                Action:
                  - 'logs:CreateLogGroup'
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                Resource:
                  - 'arn:aws:logs:*:*:*:/aws-glue/*'


  MyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: pruebarolescrawler
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          -
            Effect: "Allow"
            Principal:
              Service:
                - "glue.amazonaws.com"
            Action:
              - "sts:AssumeRole"
      Path: "/"
      ManagedPolicyArns:
        ['arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole']
      Policies:
        -
          PolicyName: "S3BucketAccessPolicy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              -
                Effect: "Allow"
                Action: 
                  - "s3:GetObject"
                  - "s3:PutObject"
                Resource: 
                  !Join
                    - ''
                    - - arn:aws:s3:::stage-nelson-dev
                      - "*"
  
  MyCrawler2:
    Type: AWS::Glue::Crawler
    Properties:
      Name: "testcrawler1"
      Role: !Ref MyRole
      DatabaseName: !Ref pdbAnalyticsName
      Targets:
        S3Targets:
          - Path: arn:aws:s3:::stage-nelson-dev
      SchemaChangePolicy:
        UpdateBehavior: "UPDATE_IN_DATABASE"
        DeleteBehavior: "LOG"
      Tags:
        "Key1": "Value1"
      Schedule:
        ScheduleExpression: "cron(0/10 * ? * MON-FRI *)"
