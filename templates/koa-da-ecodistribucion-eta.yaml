AWSTemplateFormatVersion: "2010-09-09"
Description: Template for creating AWS Proyecto Eta

Parameters:
  Stage:
    Type: String
    Description: Environment name (dev/qa/prod)
    AllowedValues: [dev, qa, prod]
  pBranchName:
    Description: "Branch Name(all lowercase, no symbols or spaces)"
    Type: String
  pArtifactsBucket:
    Description: "Artifact Bucket (all lowercase, no symbols or spaces)"
    Type: String
  pbucketAnalytics:
    Description: "Artifact Bucket (all lowercase, no symbols or spaces)"
    Type: String
  pAWSRegion:
    Description: "AWS region (all lowercase, no symbols or spaces)"
    Type: String
  pAWSAccountId:
    Description: "AWS account ID (all lowercase, no symbols or spaces)"
    Type: String
  pAWSAccountOpt:
    Description: "AWS account optimizador ID (all lowercase, no symbols or spaces)"
    Type: String
  pAccountName:
    Description: "AWS account name (all lowercase, no symbols or spaces)"
    Type: String
  pTeamName:
    Description: "Team Name (all lowercase, no symbols or spaces)"
    Type: String
  pdeploymentDate:
    Description: "Deployment date (all lowercase, no symbols or spaces)"
    Type: String
  pdbStageName:
    Description: "Database Stage name (all lowercase, no symbols or spaces)"
    Type: String
  pdbAnalyticsName:
    Description: "Database analytics name (all lowercase, no symbols or spaces)"
    Type: String
  pdeveloper:
    Description: "Database analytics name (all lowercase, no symbols or spaces)"
    Type: String
    Default: Josemaria_Paucar
  pRDAWSAccountId:
    Description: "Account Ruta Digital (all lowercase, no symbols or spaces)"
    Type: String
  # Country parameters
  pCountryCl:
    Description: "Country code for Chile"
    Type: String
    Default: "cl"
  pCountryPy:
    Description: "Country code for Paraguay"
    Type: String
    Default: "py"
  pCountryAr:
    Description: "Country code for Argentina"
    Type: String
    Default: "ar"
  pCountryBr:
    Description: "Country code for Brazil"
    Type: String
    Default: "br"
  pCountryRg:
    Description: "Country code for Regional"
    Type: String
    Default: "rg"
  # Required for referenced resources

#Conditions:
#  IsDev: !Equals [!Ref Stage, "dev"]

Resources:
  projectEtaClRole:
    Type: AWS::IAM::Role
    Condition: IsDev
    Properties:
      RoleName: !Sub "Role-${pTeamName}-Eta-${pCountryCl}"
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole"
        - "arn:aws:iam::aws:policy/AmazonSNSFullAccess"
        - "arn:aws:iam::aws:policy/AmazonAthenaFullAccess"
        - "arn:aws:iam::aws:policy/SecretsManagerReadWrite"
        - "arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess"
        - "arn:aws:iam::aws:policy/CloudWatchLogsFullAccess"
        - "arn:aws:iam::aws:policy/AmazonS3FullAccess"
      MaxSessionDuration: 43200
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              Service:
                - "glue.amazonaws.com"
                - "lambda.amazonaws.com"
            Action:
              - "sts:AssumeRole"
      Path: "/"
      Policies:
        - PolicyName: !Sub "${pTeamName}-access-to-s3-policy-bucketfile"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: AccessToS3Policy
                Effect: Allow
                Action: s3:*
                Resource:
                  - !Sub "arn:aws:s3:::${pTeamName}-${pAccountName}-stage-file-${Stage}/*"
              - Sid: ReadSecretsManager
                Effect: Allow
                Action:
                  - "secretsmanager:GetSecretValue"
                  - "secretsmanager:DescribeSecret"
                  - "secretsmanager:ListSecrets"
                Resource:
                  - !Sub "arn:aws:secretsmanager:${pAWSRegion}:${pAWSAccountId}:secret:*"
              - Sid: AccessTosqsPolicy
                Effect: Allow
                Action:
                  - "sqs:ReceiveMessage"
                  - "sqs:DeleteMessage"
                  - "sqs:GetQueueAttributes"
                  - "sqs:GetQueueUrl"
                  - "sqs:SendMessage"
                Resource:
                  - "*"
              - Sid: AccessToLogsPolicy
                Effect: Allow
                Action:
                  - "logs:CreateLogGroup"
                  - "logs:CreateLogStream"
                  - "logs:PutLogEvents"
                Resource: "arn:aws:logs:*:*:*"

  etaCLDynamo:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "table-${pTeamName}-eta-${pCountryCl}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: Route_id
          AttributeType: S
        - AttributeName: Planned_date
          AttributeType: S
      KeySchema:
        - AttributeName: Route_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: Planned_date
          KeySchema:
            - AttributeName: Planned_date
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: develop
          Value: !Ref pdeveloper

  etaDetailCLDynamo:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "table-${pTeamName}-eta-detail-${pCountryCl}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: Route_id
          AttributeType: S
        - AttributeName: Planned_date
          AttributeType: S
      KeySchema:
        - AttributeName: Route_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: Planned_date
          KeySchema:
            - AttributeName: Planned_date
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: develop
          Value: !Ref pdeveloper

  etaSrCLLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "Lambda-${pTeamName}-sr-eta-${pCountryCl}"
      Handler: lambda_function.lambda_handler
      Role: !GetAtt projectEtaClRole.Arn
      Runtime: python3.13
      Timeout: 900
      MemorySize: 2048
      Code:
        ZipFile: |
          import os

          def handler(event, context):
              desarrollador = os.getenv("DEVELOPER", "Desconocido")
              return {
                  "statusCode": 200,
                  "body": f"Hola mundo desde {desarrollador}"
              }
      Environment:
        Variables:
          DYNAMO_TABLE_ETA: !Ref etaCLDynamo
          DYNAMO_TABLE_ETA_DETAIL: !Ref etaDetailCLDynamo
          ACCOUNT_ID: !Ref pAWSAccountId
      Tags:
        - Key: develop
          Value: !Ref pdeveloper
  
  etaSrCLLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt etaSrCLLambda.Arn
      Action: "lambda:InvokeFunction"
      Principal: !Sub "arn:aws:iam::${pRDAWSAccountId}:root"
      SourceAccount: !Ref pRDAWSAccountId

  etaMlCLLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "Lambda-${pTeamName}-ml-eta-${pCountryCl}"
      Handler: lambda_function.lambda_handler
      Role: !GetAtt projectEtaClRole.Arn
      Runtime: python3.13
      Timeout: 900
      MemorySize: 2048
      Code:
        ZipFile: |
          import os

          def handler(event, context):
              desarrollador = os.getenv("DEVELOPER", "Desconocido")
              return {
                  "statusCode": 200,
                  "body": f"Hola mundo desde {desarrollador}"
              }
      Environment:
        Variables:
          DYNAMO_TABLE_ETA: !Ref etaCLDynamo
          DYNAMO_TABLE_ETA_DETAIL: !Ref etaDetailCLDynamo
          ACCOUNT_ID: !Ref pAWSAccountId
      Tags:
        - Key: develop
          Value: !Ref pdeveloper

  taMlCLSqsDeadLetter:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "sqs-dlq-${pTeamName}-ml-eta-${pCountryCl}"

  taMlCLSqs:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "sqs-${pTeamName}-ml-eta-${pCountryCl}"
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt taMlCLSqsDeadLetter.Arn
        maxReceiveCount: 3 
      Tags:
        - Key: develop
          Value: !Ref pdeveloper      

  taMlCLSqsMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt taMlCLSqs.Arn
      FunctionName: !GetAtt etaMlCLLambda.Arn
      BatchSize: 1               
      Enabled: true
      
  
